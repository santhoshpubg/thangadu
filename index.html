<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songattae Joghee - Interactive Family Tree</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #2d3748;
            --primary: #1a365d;
            --accent: #2b6cb0;
            --border-color: #cbd5e0;
            --spouse-color: #d63384;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        header h1 { margin: 0; font-size: 2rem; }
        header p { margin: 5px 0 0 0; color: #cbd5e0; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        button:hover { background: #1d4ed8; }
        
        .btn-secondary { background: #4a5568; }
        .btn-secondary:hover { background: #2d3748; }

        .tree-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            overflow-x: auto;
        }

        .tree ul {
            margin-left: 10px;
            position: relative;
            list-style-type: none;
            padding-left: 0;
        }

        .tree li {
            margin: 0;
            padding: 8px 0 8px 25px;
            position: relative;
        }

        .tree li::before {
            content: "";
            position: absolute; top: 0; left: 0;
            border-left: 2px solid var(--border-color);
            width: 1px; height: 100%;
        }

        .tree li::after {
            content: "";
            position: absolute; top: 22px; left: 0;
            border-top: 2px solid var(--border-color);
            width: 22px; height: 1px;
        }

        .tree li:last-child::before { height: 22px; }

        .node-box {
            display: inline-flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .node-box:hover {
            transform: translateX(3px);
            border-color: var(--accent);
            background: #fff;
        }

        .gen-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
        }

        /* Generation Colors */
        .g1 { background: #fed7d7; color: #9b2c2c; }
        .g2 { background: #feebc8; color: #9c4221; }
        .g3 { background: #e2f0cb; color: #4a5d23; }
        .g4 { background: #e6fffa; color: #234e52; }
        .g5 { background: #ebf8ff; color: #2b6cb0; }
        .g6 { background: #e0e0ff; color: #4433a3; }
        .g7 { background: #fed7e2; color: #97266d; }
        .g8 { background: #edf2f7; color: #2d3748; }

        .member-name { font-weight: 600; }
        
        .spouse-container {
            color: var(--spouse-color);
            font-weight: 500;
            margin-left: 6px;
            display: inline-flex;
            align-items: center;
        }
        .spouse-container::before {
            content: "❤️";
            margin-right: 4px;
            font-size: 0.85rem;
        }

        /* Modal Overlay Window */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .modal-content h3 { margin-top: 0; color: var(--primary); }
        .modal-content input {
            width: 100%; padding: 10px; margin: 12px 0;
            border: 1px solid var(--border-color);
            border-radius: 6px; box-sizing: border-box;
        }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Songattae Joghee</h1>
        <p>Interactive Family Lineage & Records</p>
    </header>

    <div class="toolbar">
        <div>
            <strong>Interactive Features:</strong> Click on any individual to add or update their wife's name.
        </div>
        <div>
            <button class="btn-secondary" onclick="exportData()">💾 Backup Data (JSON)</button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📂 Restore Data</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div class="tree-card">
        <div class="tree" id="treeContainer"></div>
    </div>
</div>

<div class="modal" id="spouseModal">
    <div class="modal-content">
        <h3 id="modalTitle">Edit Family Record</h3>
        <label for="spouseInput">Wife / Spouse Name:</label>
        <input type="text" id="spouseInput" placeholder="Enter full name">
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button onclick="saveSpouse()">Save Changes</button>
        </div>
    </div>
</div>

<script>
    // Raw Datastore
    const familyData = [
        { id: 1, gen: 1, name: "Songattae Joghee", parent: null },
        { id: 2, gen: 2, name: "Songattae Linga", parent: 1 },
        { id: 3, gen: 3, name: "Madhayya", parent: 2 },
        { id: 4, gen: 3, name: "Raman (No Children)", parent: 2 },
        { id: 5, gen: 3, name: "Lakshmanan", parent: 2 },
        { id: 6, gen: 3, name: "Joghee", parent: 2 },
        { id: 7, gen: 4, name: "Krishnan", parent: 3 },
        { id: 8, gen: 4, name: "Lingan", parent: 3 },
        { id: 9, gen: 5, name: "Maharajan", parent: 7 },
        { id: 10, gen: 5, name: "Gopalan", parent: 7 },
        { id: 11, gen: 5, name: "Sundaran", parent: 7 },
        { id: 12, gen: 5, name: "Mohan", parent: 7 },
        { id: 13, gen: 6, name: "Balasubramanian", parent: 9 },
        { id: 14, gen: 7, name: "Dhakshinamoorthy", parent: 13 },
        { id: 15, gen: 8, name: "Dhakshara", parent: 14 },
        { id: 16, gen: 7, name: "Lingeshwaran", parent: 13 },
        { id: 17, gen: 6, name: "Gowtham Ganesh", parent: 10 },
        { id: 18, gen: 7, name: "Dev Adhitya", parent: 17 },
        { id: 19, gen: 6, name: "Santhosh", parent: 11 },
        { id: 20, gen: 7, name: "Deendayal", parent: 19 },
        { id: 21, gen: 5, name: "Arumugan", parent: 8 },
        { id: 22, gen: 5, name: "Chandran", parent: 8 },
        { id: 23, gen: 5, name: "Sankaran", parent: 8 },
        { id: 24, gen: 5, name: "Raman", parent: 8 },
        { id: 25, gen: 6, name: "Kannan", parent: 21 },
        { id: 26, gen: 7, name: "Jithendhar", parent: 25 },
        { id: 27, gen: 6, name: "Suresh", parent: 21 },
        { id: 28, gen: 7, name: "Sourath", parent: 27 },
        { id: 29, gen: 7, name: "Amarnath", parent: 27 },
        { id: 30, gen: 6, name: "Ramesh", parent: 21 },
        { id: 31, gen: 7, name: "Abhilash", parent: 30 },
        { id: 32, gen: 6, name: "Mani", parent: 22 },
        { id: 33, gen: 6, name: "Vijayakumar", parent: 23 },
        { id: 34, gen: 6, name: "Saravanan", parent: 24 },
        { id: 35, gen: 4, name: "Subramani a.k.a Sivayya", parent: 5 },
        { id: 36, gen: 5, name: "Bhojan", parent: 35 },
        { id: 37, gen: 6, name: "Rubesh", parent: 36 },
        { id: 38, gen: 6, name: "Rajesh", parent: 36 },
        { id: 39, gen: 4, name: "Raman", parent: 6 },
        { id: 40, gen: 4, name: "Shanmugan", parent: 6 },
        { id: 41, gen: 5, name: "Radhakrishnan", parent: 39 },
        { id: 42, gen: 5, name: "Ravi", parent: 39 },
        { id: 43, gen: 6, name: "Parshith", parent: 41 },
        { id: 44, gen: 6, name: "Sailesh", parent: 41 },
        { id: 45, gen: 6, name: "Kishore", parent: 42 },
        { id: 46, gen: 5, name: "Senthil", parent: 40 },
        { id: 47, gen: 6, name: "Siddhesh Joghee", parent: 46 }
    ];

    let spouses = JSON.parse(localStorage.getItem('familySpouses')) || {};
    let activeMemberId = null;

    function buildTree(parentId) {
        const children = familyData.filter(m => m.parent === parentId);
        if (children.length === 0) return '';
        
        let html = '<ul>';
        children.forEach(member => {
            const spouseName = spouses[member.id] ? `<span class="spouse-container">${spouses[member.id]}</span>` : '';
            html += `
                <li>
                    <div class="node-box" onclick="openModal(${member.id}, '${member.name}')">
                        <span class="gen-badge g${member.gen}">Gen ${member.gen}</span>
                        <span class="member-name">${member.name}</span>
                        ${spouseName}
                    </div>
                    ${buildTree(member.id)}
                </li>`;
        });
        html += '</ul>';
        return html;
    }

    function renderTree() {
        document.getElementById('treeContainer').innerHTML = buildTree(null);
    }

    function openModal(id, name) {
        activeMemberId = id;
        document.getElementById('modalTitle').innerText = `Update Spouse for ${name}`;
        document.getElementById('spouseInput').value = spouses[id] || '';
        document.getElementById('spouseModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('spouseModal').style.display = 'none';
    }

    function saveSpouse() {
        const value = document.getElementById('spouseInput').value.trim();
        if (value) {
            spouses[activeMemberId] = value;
        } else {
            delete spouses[activeMemberId];
        }
        localStorage.setItem('familySpouses', JSON.stringify(spouses));
        closeModal();
        renderTree();
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(spouses));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "family_tree_spouses_backup.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                spouses = imported;
                localStorage.setItem('familySpouses', JSON.stringify(spouses));
                renderTree();
                alert("Data successfully restored!");
            } catch (err) {
                alert("Invalid backup file format.");
            }
        };
        reader.readAsText(file);
    }

    // Initialize Page
    renderTree();
</script>
</body>
</html>
